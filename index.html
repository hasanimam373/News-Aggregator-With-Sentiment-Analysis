<!DOCTYPE html>
<html lang="en">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    body {

      transition: all 0.2s ease;
      border-radius: 12px;
      font-weight: 600;
    }
    .action-btn:hover {
      transform: scale(1.05);
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<script>
// YOUR EXACT ORIGINAL JAVASCRIPT CODE - NO CHANGES
const API_ENDPOINT = 'https://36t7k147x1.execute-api.ap-south-1.amazonaws.com/default/NewsAggregatorFrontendAPI';

// Get current user's email
function getCurrentUserEmail() {
  return localStorage.getItem('userEmail');
}

// Initialize user reactions in localStorage if not exists
function initializeUserReactions() {
  const userEmail = getCurrentUserEmail();
  if (!userEmail) return;
  
  const userReactionsKey = `userReactions_${userEmail}`;
  if (!localStorage.getItem(userReactionsKey)) {
    localStorage.setItem(userReactionsKey, JSON.stringify({}));
  }
}

// Get user reactions for an article for current user
function getUserReaction(articleUrl) {
  const userEmail = getCurrentUserEmail();
  if (!userEmail) return null;
  
  const userReactionsKey = `userReactions_${userEmail}`;
  const userReactions = JSON.parse(localStorage.getItem(userReactionsKey) || '{}');
  return userReactions[articleUrl] || null; // Returns 'like', 'dislike', or null
}

// Update user reaction for an article for current user
function updateUserReaction(articleUrl, reaction) {
  const userEmail = getCurrentUserEmail();
  if (!userEmail) return;
  
  const userReactionsKey = `userReactions_${userEmail}`;
  const userReactions = JSON.parse(localStorage.getItem(userReactionsKey) || '{}');
  userReactions[articleUrl] = reaction;
  localStorage.setItem(userReactionsKey, JSON.stringify(userReactions));
}

// Remove user reaction for an article for current user
function removeUserReaction(articleUrl) {
  const userEmail = getCurrentUserEmail();
  if (!userEmail) return;
  
  const userReactionsKey = `userReactions_${userEmail}`;
  const userReactions = JSON.parse(localStorage.getItem(userReactionsKey) || '{}');
  delete userReactions[articleUrl];
  localStorage.setItem(userReactionsKey, JSON.stringify(userReactions));
}

// Get article counts from localStorage (aggregated across all users)
function getArticleCounts(articleUrl) {
  const articleCounts = JSON.parse(localStorage.getItem('articleCounts') || '{}');
  return articleCounts[articleUrl] || { likes: 0, dislikes: 0 };
}

// Update article counts in localStorage (aggregated across all users)
function updateArticleCounts(articleUrl, likes, dislikes) {
  const articleCounts = JSON.parse(localStorage.getItem('articleCounts') || '{}');
  articleCounts[articleUrl] = { likes, dislikes };
  localStorage.setItem('articleCounts', JSON.stringify(articleCounts));
}

// Calculate total counts across all users
function calculateTotalCounts(articleUrl) {
  const articleCounts = JSON.parse(localStorage.getItem('articleCounts') || '{}');
  return articleCounts[articleUrl] || { likes: 0, dislikes: 0 };
}

// ENHANCED LIKE FUNCTION - Supports multiple users
function handleLike(articleUrl, btn) {
  const userEmail = getCurrentUserEmail();
  if (!userEmail) {
    alert('Please login to like articles');
    window.location.href = 'login.html';
    return;
  }

  initializeUserReactions();
  const currentReaction = getUserReaction(articleUrl);
  const currentCounts = calculateTotalCounts(articleUrl);
  
  const card = btn.closest('.article-card');
  const dislikeBtn = card.querySelector('.dislike-btn');
  const likeCount = btn.querySelector('.like-count');
  const dislikeCount = dislikeBtn.querySelector('.dislike-count');

  let newLikes = currentCounts.likes;
  let newDislikes = currentCounts.dislikes;

  if (currentReaction === 'like') {
    // User is unliking
    newLikes = Math.max(0, newLikes - 1);
    removeUserReaction(articleUrl);
    btn.classList.remove('bg-blue-700');
    btn.classList.add('bg-blue-500');
  } else if (currentReaction === 'dislike') {
    // User is switching from dislike to like
    newDislikes = Math.max(0, newDislikes - 1);
    newLikes += 1;
    updateUserReaction(articleUrl, 'like');
    btn.classList.remove('bg-blue-500');
    btn.classList.add('bg-blue-700');
    dislikeBtn.classList.remove('bg-red-700');
    dislikeBtn.classList.add('bg-red-500');
  } else {
    // User is liking for the first time
    newLikes += 1;
    updateUserReaction(articleUrl, 'like');
    btn.classList.remove('bg-blue-500');
    btn.classList.add('bg-blue-700');
  }

  // Update aggregated counts in localStorage
  updateArticleCounts(articleUrl, newLikes, newDislikes);
  
  // Update UI
  likeCount.textContent = newLikes;
  dislikeCount.textContent = newDislikes;
  
  console.log('Like updated for user:', userEmail, 'Article:', articleUrl, 'Reaction:', getUserReaction(articleUrl));
}

// ENHANCED DISLIKE FUNCTION - Supports multiple users
function handleDislike(articleUrl, btn) {
  const userEmail = getCurrentUserEmail();
  if (!userEmail) {
    alert('Please login to dislike articles');
    window.location.href = 'login.html';
    return;
  }

  initializeUserReactions();
  const currentReaction = getUserReaction(articleUrl);
  const currentCounts = calculateTotalCounts(articleUrl);
  
  const card = btn.closest('.article-card');
  const likeBtn = card.querySelector('.like-btn');
  const likeCount = likeBtn.querySelector('.like-count');
  const dislikeCount = btn.querySelector('.dislike-count');

  let newLikes = currentCounts.likes;
  let newDislikes = currentCounts.dislikes;

  if (currentReaction === 'dislike') {
    // User is undisliking
    newDislikes = Math.max(0, newDislikes - 1);
    removeUserReaction(articleUrl);
    btn.classList.remove('bg-red-700');
    btn.classList.add('bg-red-500');
  } else if (currentReaction === 'like') {
    // User is switching from like to dislike
    newLikes = Math.max(0, newLikes - 1);
    newDislikes += 1;
    updateUserReaction(articleUrl, 'dislike');
    btn.classList.remove('bg-red-500');
    btn.classList.add('bg-red-700');
    likeBtn.classList.remove('bg-blue-700');
    likeBtn.classList.add('bg-blue-500');
  } else {
    // User is disliking for the first time
    newDislikes += 1;
    updateUserReaction(articleUrl, 'dislike');
    btn.classList.remove('bg-red-500');
    btn.classList.add('bg-red-700');
  }

  // Update aggregated counts in localStorage
  updateArticleCounts(articleUrl, newLikes, newDislikes);
  
  // Update UI
  likeCount.textContent = newLikes;
  dislikeCount.textContent = newDislikes;
  
  console.log('Dislike updated for user:', userEmail, 'Article:', articleUrl, 'Reaction:', getUserReaction(articleUrl));
}

// COMMENTS FUNCTION - Stores in localStorage (shared across all users)
function showCommentsModal(articleUrl) {
  const userEmail = getCurrentUserEmail();
  if (!userEmail) {
    alert('Please login to view comments');
    window.location.href = 'login.html';
    return;
  }

  const modal = document.createElement('div');
  modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
  modal.innerHTML = `
    <div class="bg-white rounded-3xl p-6 max-w-2xl w-full max-h-[80vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-2xl font-bold">Comments</h3>
        <button class="close-modal text-3xl text-slate-500 hover:text-slate-700">&times;</button>
      </div>
      <div class="mb-4">
        <textarea id="commentInput" placeholder="Write a comment..." class="w-full p-3 border-2 border-slate-200 rounded-xl" rows="3"></textarea>
        <button id="submitComment" class="mt-2 px-4 py-2 bg-blue-500 text-white rounded-lg font-semibold hover:bg-blue-600">Post Comment</button>
      </div>
      <div id="commentsContainer" class="space-y-4">Loading comments...</div>
    </div>
  `;
  
  document.body.appendChild(modal);
  
  // Close modal
  modal.querySelector('.close-modal').onclick = () => modal.remove();
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
  
  // Load comments from localStorage
  function loadComments() {
    const container = modal.querySelector('#commentsContainer');
    const localComments = JSON.parse(localStorage.getItem(`comments_${articleUrl}`) || '[]');
    
    if (localComments.length === 0) {
      container.innerHTML = '<div class="text-center text-slate-500">No comments yet. Be the first to comment!</div>';
    } else {
      container.innerHTML = localComments.map(comment => `
        <div class="bg-slate-50 p-4 rounded-xl">
          <div class="flex justify-between items-start mb-2">
            <span class="font-semibold text-slate-800">${comment.userName}</span>
            <span class="text-xs text-slate-500">${new Date(comment.timestamp).toLocaleString()}</span>
          </div>
          <p class="text-slate-600">${comment.comment}</p>
        </div>
      `).join('');
    }
  }
  
  loadComments();
  
  // Submit comment to localStorage
  modal.querySelector('#submitComment').onclick = function() {
    const commentText = modal.querySelector('#commentInput').value.trim();
    if (!commentText) return alert('Please enter a comment');
    
    const newComment = {
      userName: localStorage.getItem('userName') || 'User',
      comment: commentText,
      timestamp: new Date().toISOString()
    };
    
    // Save to localStorage (shared across all users)
    const existingComments = JSON.parse(localStorage.getItem(`comments_${articleUrl}`) || '[]');
    existingComments.push(newComment);
    localStorage.setItem(`comments_${articleUrl}`, JSON.stringify(existingComments));
    
    alert('Comment posted successfully!');
    modal.querySelector('#commentInput').value = '';
    loadComments();
  };
}

// REST OF YOUR ORIGINAL CODE
const newsContainer = document.getElementById('news-container');
const searchInput = document.getElementById('searchInput');
const filterButtons = document.querySelectorAll('.filter-btn');
const categoryButtons = document.querySelectorAll('.category-btn');
const loadingSpinner = document.getElementById('loading');
const noResultsMessage = document.getElementById('no-results');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageInfo = document.getElementById('pageInfo');

let activeFilter = 'allFilter';
let activeCategory = 'allCategory';
let allArticles = [];
let filteredArticles = [];
let currentPage = 1;
let articlesPerPage = 12;

// Initialize localStorage on page load
initializeUserReactions();

// Create News Card - Updated to use localStorage data
function createNewsCard(article) {
  let sentimentColor = '';
  let sentimentEmoji = '';

  switch(article.sentiment){
    case 'positive': sentimentColor='bg-green-500'; sentimentEmoji='😊 Positive'; break;
    case 'neutral': sentimentColor='bg-slate-500'; sentimentEmoji='😐 Neutral'; break;
    case 'negative': sentimentColor='bg-red-500'; sentimentEmoji='😔 Negative'; break;
    case 'mixed': sentimentColor='bg-yellow-500'; sentimentEmoji='🤔 Mixed'; break;
    default: sentimentColor='bg-slate-500'; sentimentEmoji='😐 Neutral';
  }

  // Get aggregated counts and current user's reaction from localStorage
  const articleCounts = calculateTotalCounts(article.url);
  const userReaction = getUserReaction(article.url);
  
  const likeCount = articleCounts.likes || 0;
  const dislikeCount = articleCounts.dislikes || 0;
  
  // Set button styles based on current user's reaction
  const likeBtnClass = userReaction === 'like' ? 'bg-blue-700' : 'bg-blue-500';
  const dislikeBtnClass = userReaction === 'dislike' ? 'bg-red-700' : 'bg-red-500';

  return `
  <div class="bg-white rounded-3xl overflow-hidden shadow-lg hover:shadow-xl transition-shadow duration-300 article-card" data-url="${article.url}">
    <img src="${article.image || 'https://placehold.co/400x200/cccccc/666666?text=No+Image'}" alt="${article.title}" class="w-full h-48 object-cover" onerror="this.src='https://placehold.co/400x200/cccccc/666666?text=No+Image'">
    <div class="p-6">
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm font-semibold text-slate-500">${article.source || 'Unknown'}</span>
        <span class="text-xs font-bold text-white px-2 py-1 rounded-full ${sentimentColor}">${sentimentEmoji}</span>
      </div>
      <h2 class="text-xl font-bold mb-2 leading-tight">${article.title}</h2>
      <p class="text-slate-600 text-sm leading-relaxed mb-4">${article.summary}</p>
      <div class="flex gap-3 mb-4 items-center flex-wrap">
        <button class="like-btn px-3 py-2 ${likeBtnClass} text-white rounded-lg font-semibold hover:bg-blue-600 transition flex items-center gap-1">
          👍 <span class="like-count">${likeCount}</span>
        </button>
        <button class="dislike-btn px-3 py-2 ${dislikeBtnClass} text-white rounded-lg font-semibold hover:bg-red-600 transition flex items-center gap-1">
          👎 <span class="dislike-count">${dislikeCount}</span>
        </button>
        <button class="comment-btn px-3 py-2 bg-slate-500 text-white rounded-lg font-semibold hover:bg-slate-600 transition">
          💬 Comments
        </button>
      </div>
      <a href="${article.url}" target="_blank" class="w-full action-btn px-4 py-3 bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-xl font-semibold hover:from-blue-600 hover:to-purple-700 transition-all shadow-lg text-center block">
  <i class="fas fa-external-link-alt mr-2"></i>Read Full Story
</a>
    </div>
  </div>`;
}

function renderNews() {
  const startIndex = (currentPage - 1) * articlesPerPage;
  const endIndex = startIndex + articlesPerPage;
  const articlesToShow = filteredArticles.slice(startIndex, endIndex);
  newsContainer.innerHTML = '';

  if(articlesToShow.length === 0){
    if(currentPage === 1) noResultsMessage.style.display = 'block';
    else { currentPage--; renderNews(); return; }
  } else {
    noResultsMessage.style.display = 'none';
    articlesToShow.forEach((article) => {
      const div = document.createElement('div');
      div.innerHTML = createNewsCard(article).trim();
      const cardElement = div.firstChild;
      newsContainer.appendChild(cardElement);
      
      const articleUrl = cardElement.dataset.url;
      const likeBtn = cardElement.querySelector('.like-btn');
      const dislikeBtn = cardElement.querySelector('.dislike-btn');
      const commentBtn = cardElement.querySelector('.comment-btn');
      
      if (likeBtn) {
        likeBtn.onclick = (e) => {
          e.preventDefault();
          handleLike(articleUrl, likeBtn);
        };
      }
      
      if (dislikeBtn) {
        dislikeBtn.onclick = (e) => {
          e.preventDefault();
          handleDislike(articleUrl, dislikeBtn);
        };
      }
      
      if (commentBtn) {
        commentBtn.onclick = (e) => {
          e.preventDefault();
          showCommentsModal(articleUrl);
        };
      }
    });
  }

  updatePaginationControls();
}

function updatePaginationControls() {
  const totalPages = Math.ceil(filteredArticles.length / articlesPerPage);
  prevBtn.disabled = currentPage <= 1;
  nextBtn.disabled = currentPage >= totalPages;
  pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
  document.getElementById('pagination-container').style.display = totalPages <= 1 ? 'none' : 'flex';
}

async function fetchArticles() {
  loadingSpinner.style.display = 'block';
  noResultsMessage.style.display = 'none';
  try {
    const response = await fetch(`${API_ENDPOINT}?action=pagination&limit=500`);
    if(!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    const data = await response.json();
    allArticles = Array.isArray(data) ? data : data.items || [];
     // 🔹 Add this line to sort latest first
    allArticles.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    currentPage = 1;
  } catch(err) {
    console.error(err);
    allArticles = [];
  } finally {
    loadingSpinner.style.display = 'none';
    filterAndRender();
  }
}

function filterAndRender() {
  const searchQuery = searchInput.value.toLowerCase().trim();
  filteredArticles = allArticles.filter(article => {
    const matchesSearch = !searchQuery ||
      (article.title||'').toLowerCase().includes(searchQuery) ||
      (article.summary||'').toLowerCase().includes(searchQuery);

    let matchesSentiment = activeFilter === 'allFilter' || (article.sentiment||'neutral').toLowerCase() === activeFilter.replace('Filter','').toLowerCase();
    let matchesCategory = activeCategory === 'allCategory' || (article.category||'uncategorized').toLowerCase() === activeCategory.replace('Category','').toLowerCase();
    return matchesSearch && matchesSentiment && matchesCategory;
  });

  if(currentPage > Math.ceil(filteredArticles.length / articlesPerPage)) currentPage = 1;
  renderNews();
}

// Event listeners
document.addEventListener('DOMContentLoaded', function() {
  // Filter buttons
  filterButtons.forEach(button => {
    button.addEventListener('click', function() {
      filterButtons.forEach(btn => {
        btn.classList.remove('bg-blue-500','bg-green-500','bg-slate-500','bg-red-500','bg-yellow-500');
        btn.classList.add('bg-slate-100','text-slate-700');
        btn.classList.remove('text-white');
      });
      button.classList.remove('bg-slate-100','text-slate-700');
      button.classList.add('text-white');
      if(button.id==='allFilter') button.classList.add('bg-blue-500');
      if(button.id==='positiveFilter') button.classList.add('bg-green-500');
      if(button.id==='neutralFilter') button.classList.add('bg-slate-500');
      if(button.id==='negativeFilter') button.classList.add('bg-red-500');
      if(button.id==='mixedFilter') button.classList.add('bg-yellow-500');
      activeFilter = button.id; 
      currentPage=1; 
      filterAndRender();
    });
  });

  // Category buttons
  categoryButtons.forEach(button => {
    button.addEventListener('click', function() {
      categoryButtons.forEach(btn => {
        btn.classList.remove('bg-blue-500','text-white');
        btn.classList.add('bg-slate-100','text-slate-700');
      });
      button.classList.remove('bg-slate-100','text-slate-700');
      button.classList.add('bg-blue-500','text-white');
      activeCategory = button.id; 
      currentPage=1; 
      filterAndRender();
    });
  });

  // Search input
  searchInput.addEventListener('input', function() {
    clearTimeout(window.searchTimeout);
    window.searchTimeout = setTimeout(function() { 
      currentPage=1; 
      filterAndRender(); 
    }, 300);
  });

  // Pagination
  prevBtn.addEventListener('click', function() { 
    if(currentPage>1){ 
      currentPage--; 
      renderNews(); 
      window.scrollTo({top:0,behavior:'smooth'}); 
    }
  });
  
  nextBtn.addEventListener('click', function() { 
    const totalPages=Math.ceil(filteredArticles.length/articlesPerPage); 
    if(currentPage<totalPages){ 
      currentPage++; 
      renderNews(); 
      window.scrollTo({top:0,behavior:'smooth'}); 
    }
  });

  // User auth
  const userName = localStorage.getItem('userName');
  const userEmail = localStorage.getItem('userEmail');
  if (userName && userEmail) {
    document.getElementById('userNameDisplay').textContent = `Hello, ${userName}!`;
    document.getElementById('logoutBtn').style.display = 'block';
    document.getElementById('loginRedirectBtn').style.display = 'none';
    
    // Initialize user-specific storage when user logs in
    initializeUserReactions();
  } else {
    document.getElementById('userNameDisplay').style.display = 'none';
    document.getElementById('logoutBtn').style.display = 'none';
    document.getElementById('loginRedirectBtn').style.display = 'block';
  }

  document.getElementById('logoutBtn').addEventListener('click', function() {
    localStorage.removeItem('userName');
    localStorage.removeItem('userEmail');
    localStorage.removeItem('token');
    alert('You have been logged out');
    window.location.href = 'login.html';
  });

  document.getElementById('loginRedirectBtn').addEventListener('click', function() {
    window.location.href = 'login.html';
  });

  fetchArticles();
});
</script>
</body>
