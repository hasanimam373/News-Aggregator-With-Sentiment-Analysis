<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | News Pulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Inter', sans-serif;
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .auth-card {
      transition: all 0.3s ease-in-out;
    }
    .auth-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }
    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #6b7280;
      transition: color 0.3s ease;
    }
    .form-input {
      padding-left: 3rem;
      padding-right: 1rem;
      transition: all 0.3s ease;
      border: 2px solid #e5e7eb;
    }
    .form-input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .form-input:focus + .input-icon {
      color: #3b82f6;
    }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
    }
    .btn-secondary {
      background: linear-gradient(135deg, #10b981, #059669);
      transition: all 0.3s ease;
    }
    .btn-secondary:hover {
      background: linear-gradient(135deg, #059669, #047857);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
    }
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
  <!-- Background Decorations -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-blue-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-purple-300 rounded-full mix-blend-multiply filter blur-xl opacity-20 animate-pulse" style="animation-delay: 2s;"></div>
  </div>

  <div class="w-full max-w-md z-10">
    <!-- Header Logo -->
    <div class="text-center mb-8 fade-in">
      <div class="flex items-center justify-center gap-3 mb-4">
        <div class="w-12 h-12 bg-gradient-to-r from-blue-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg">
          <i class="fas fa-newspaper text-white text-xl"></i>
        </div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">News Pulse</h1>
      </div>
      <p class="text-slate-600">Your gateway to the world's news</p>
    </div>

    <!-- Auth Container -->
    <div class="glass-effect auth-card p-8 rounded-3xl shadow-2xl fade-in">
      <!-- LOGIN FORM -->
      <div id="loginForm">
        <div class="text-center mb-8">
          <h2 class="text-2xl font-bold text-slate-800 mb-2">Welcome Back</h2>
          <p class="text-slate-600">Sign in to continue your news journey</p>
        </div>

        <div class="input-group">
         
          <input 
            id="loginEmail" 
            type="email" 
            placeholder="Email address" 
            class="form-input w-full p-4 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/20"
          />
        </div>

        <div class="input-group">
          
          <input 
            id="loginPassword" 
            type="password" 
            placeholder="Password" 
            class="form-input w-full p-4 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/20"
          />
        </div>

        <button 
          id="loginBtn"
          class="btn-primary w-full text-white py-4 rounded-xl font-semibold text-lg shadow-lg mb-6 flex items-center justify-center gap-2"
        >
          <i class="fas fa-sign-in-alt"></i>
          Sign In
        </button>

        <div class="text-center">
          <p class="text-slate-600">
            Don't have an account?
            <a href="#" id="showRegister" class="text-blue-600 hover:text-blue-700 font-semibold ml-1 transition-colors">
              Create one here
            </a>
          </p>
        </div>
      </div>

      <!-- REGISTER FORM -->
      <div id="registerForm" class="hidden">
        <div class="text-center mb-8">
          <h2 class="text-2xl font-bold text-slate-800 mb-2">Join News Pulse</h2>
          <p class="text-slate-600">Create your account to get started</p>
        </div>

        <div class="input-group">
          
          <input 
            id="regName" 
            type="text" 
            placeholder="Full name" 
            class="form-input w-full p-4 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/20"
          />
        </div>

        <div class="input-group">
          
          <input 
            id="regEmail" 
            type="email" 
            placeholder="Email address" 
            class="form-input w-full p-4 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/20"
          />
        </div>

        <div class="input-group">
          
          <input 
            id="regPassword" 
            type="password" 
            placeholder="Password" 
            class="form-input w-full p-4 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/20"
          />
        </div>

        <button 
          id="registerBtn"
          class="btn-secondary w-full text-white py-4 rounded-xl font-semibold text-lg shadow-lg mb-6 flex items-center justify-center gap-2"
        >
          <i class="fas fa-user-plus"></i>
          Create Account
        </button>

        <div class="text-center">
          <p class="text-slate-600">
            Already have an account?
            <a href="#" id="showLogin" class="text-blue-600 hover:text-blue-700 font-semibold ml-1 transition-colors">
              Sign in here
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'https://36t7k147x1.execute-api.ap-south-1.amazonaws.com/default';

    // Toggle between Login and Register forms
    document.getElementById('showRegister').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.remove('hidden');
    });

    document.getElementById('showLogin').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('registerForm').classList.add('hidden');
      document.getElementById('loginForm').classList.remove('hidden');
    });

    // Register Function - KEEPING YOUR ORIGINAL LOGIC
    async function registerUser(name, email, password) {
      try {
        const response = await fetch(`${API_BASE_URL}/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: name,
            email: email,
            password: password
          })
        });

        const data = await response.json();

        if (response.ok) {
          console.log('Registration successful:', data);
          alert(data.message);
          // Switch to login form after successful registration
          document.getElementById('registerForm').classList.add('hidden');
          document.getElementById('loginForm').classList.remove('hidden');
          return data;
        } else {
          console.error('Registration failed:', data);
          alert(data.error || 'Registration failed');
          return null;
        }
      } catch (error) {
        console.error('Error during registration:', error);
        alert('Network error. Please try again.');
        return null;
      }
    }

    // Login Function - KEEPING YOUR ORIGINAL LOGIC
    async function loginUser(email, password) {
      try {
        const response = await fetch(`${API_BASE_URL}/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        const data = await response.json();

        if (response.ok) {
          console.log('Login successful:', data);
          alert(`Welcome back, ${data.name}!`);
          // Store user info in localStorage
          localStorage.setItem('userName', data.name);
          localStorage.setItem('userEmail', data.email);
          localStorage.setItem('token', 'logged_in');
          // Redirect to main news page
          window.location.href = 'index.html';
          return data;
        } else {
          console.error('Login failed:', data);
          alert(data.error || 'Login failed');
          return null;
        }
      } catch (error) {
        console.error('Error during login:', error);
        alert('Network error. Please try again.');
        return null;
      }
    }

    // Register button handler
    document.getElementById('registerBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      
      if (!name || !email || !password) {
        alert('Please fill in all fields');
        return;
      }
      
      await registerUser(name, email, password);
    });

    // Login button handler
    document.getElementById('loginBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      
      if (!email || !password) {
        alert('Please fill in all fields');
        return;
      }
      
      await loginUser(email, password);
    });
  </script>
</body>
